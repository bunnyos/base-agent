<!DOCTYPE html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Primary SEO -->
    <title>bunnyOS — the first open-source @base agent</title>
    <meta name="description" content="An open-source AI agent built on the Base stack to help you grow your assets." />
    <meta name="keywords" content="bunnyOS, Base agent, AI agent crypto, open source crypto agent, Base MCP, DeFi agent, onchain AI, Coinbase Base, autonomous agent, self-hosted crypto agent" />
    <meta name="author" content="bunnyOS" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow" />
    <link rel="canonical" href="https://bunnyos.ai/" />

    <!-- Theme + mobile chrome -->
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="color-scheme" content="light dark" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="bunnyOS" />
    <meta name="application-name" content="bunnyOS" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="shortcut icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Open Graph (Facebook, LinkedIn, Telegram, Discord, Slack, iMessage) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="bunnyOS" />
    <meta property="og:title" content="bunnyOS — the first open-source @base agent" />
    <meta property="og:description" content="An open-source AI agent built on the Base stack to help you grow your assets." />
    <meta property="og:url" content="https://bunnyos.ai/" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:image" content="https://bunnyos.ai/opengraph.jpg" />
    <meta property="og:image:secure_url" content="https://bunnyos.ai/opengraph.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1280" />
    <meta property="og:image:height" content="720" />
    <meta property="og:image:alt" content="bunnyOS — the first open-source @base agent" />

    <!-- Twitter / X cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@bunnyOS_" />
    <meta name="twitter:creator" content="@bunnyOS_" />
    <meta name="twitter:title" content="bunnyOS — the first open-source @base agent" />
    <meta name="twitter:description" content="An open-source AI agent built on the Base stack to help you grow your assets." />
    <meta name="twitter:image" content="https://bunnyos.ai/opengraph.jpg" />
    <meta name="twitter:image:alt" content="bunnyOS — the first open-source @base agent" />

    <!-- Telegram (uses OG; explicit channel hint) -->
    <meta name="telegram:channel" content="@bunnyOS" />

    <!-- Structured data for Google rich results -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "SoftwareApplication",
          "name": "bunnyOS",
          "applicationCategory": "FinanceApplication",
          "operatingSystem": "Web, Linux, macOS, Windows (self-hosted)",
          "description": "An open-source AI agent built on the Base stack to help you grow your assets.",
          "url": "https://bunnyos.ai/",
          "image": "https://bunnyos.ai/opengraph.jpg",
          "license": "https://www.gnu.org/licenses/agpl-3.0.html",
          "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
          "softwareVersion": "1.0",
          "author": { "@type": "Organization", "name": "bunnyOS" }
        },
        {
          "@type": "Organization",
          "name": "bunnyOS",
          "url": "https://bunnyos.ai/",
          "logo": "https://bunnyos.ai/favicon.png",
          "sameAs": [
            "https://x.com/bunnyOS_",
            "https://github.com/bunnyos"
          ]
        },
        {
          "@type": "WebSite",
          "name": "bunnyOS",
          "url": "https://bunnyos.ai/",
          "inLanguage": "en"
        }
      ]
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <div id="root"></div>
